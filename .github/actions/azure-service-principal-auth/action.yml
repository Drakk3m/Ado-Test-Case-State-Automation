name: Internal Azure Service Principal Authentication
description: Acquires the organization-provided Azure access token for the calling workflow.

inputs:
  sp_client_id:
    description: Azure Service Principal client ID.
    required: true
  sp_client_tenant_id:
    description: Azure tenant ID.
    required: true
  sp_client_secret:
    description: Azure Service Principal client secret.
    required: true

outputs:
  token:
    description: Short-lived Azure access token.
    value: ${{ steps.auth_token.outputs.token }}

runs:
  using: composite
  steps:
    - name: Acquire Azure access token
      id: auth_token
      uses: software/nimbus_azure-authentication@v1
      with:
        auth_method: "sp_creds"
        sp_client_id: ${{ inputs.sp_client_id }}
        sp_client_tenant_id: ${{ inputs.sp_client_tenant_id }}
        sp_client_secret: ${{ inputs.sp_client_secret }}
