name: ADO Work Item Updated

on:
  repository_dispatch:
    types: [ado-work-item-updated]

permissions:
  contents: read

# V1 serializes identical Work Item IDs even when they belong to different projects.
concurrency:
  group: ado-work-item-${{ github.event.client_payload.ado_event.resource.workItemId || github.event.client_payload.ado_event.resource.revision.id || github.run_id }}
  cancel-in-progress: false

jobs:
  process-work-item:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Acquire Azure DevOps access token
        id: auth_token
        uses: software/nimbus_azure-authentication@v1
        with:
          auth_method: "sp_creds"
          sp_client_id: ${{ secrets.CAL__AZURE_CLIENT_ID }}
          sp_client_tenant_id: ${{ secrets.CAL__AZURE_TENANT_ID }}
          sp_client_secret: ${{ secrets.CAL__AZURE_CLIENT_SECRET }}

      - name: Build one-shot runner
        run: mvn -B -q -DskipTests compile dependency:copy-dependencies -DincludeScope=runtime

      - name: Write dispatch payload to temporary file
        env:
          CLIENT_PAYLOAD: ${{ toJson(github.event.client_payload) }}
        shell: bash
        run: |
          payload_file="$RUNNER_TEMP/ado-repository-dispatch.json"
          umask 077
          printf '%s' "$CLIENT_PAYLOAD" > "$payload_file"
          echo "ADO_EVENT_PAYLOAD_FILE=$payload_file" >> "$GITHUB_ENV"

      - name: Run approval bot once
        env:
          ADO_ACCESS_TOKEN: ${{ steps.auth_token.outputs.token }}
        shell: bash
        run: |
          java -cp "target/classes:target/dependency/*" \
            com.dentalwings.approvalbot.dispatch.RepositoryDispatchOneShotRunner \
            --payload "$ADO_EVENT_PAYLOAD_FILE" \
            --config "config/application-github-action.yml"

      - name: Remove temporary payload
        if: always()
        shell: bash
        run: rm -f "$RUNNER_TEMP/ado-repository-dispatch.json"
